<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <title>Frogger</title>
    <style>
      :root {
        color-scheme: dark;
        --pad: #0a0a0a;
        --pad-face: #141414;
        --pad-edge: #2a2a2a;
        --pad-accent: #ffff00;
        --pad-cyan: #00ffff;
        --pad-green: #1dc300;
        --safe-b: env(safe-area-inset-bottom, 0px);
        --safe-l: env(safe-area-inset-left, 0px);
        --safe-r: env(safe-area-inset-right, 0px);
        --safe-t: env(safe-area-inset-top, 0px);
        --controls-h: 0px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        height: 100dvh;
        background: #000;
        font-family: "Press Start 2P", monospace;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      #app {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        height: 100dvh;
        padding: var(--safe-t) var(--safe-r) 0 var(--safe-l);
      }

      #stage {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
      }

      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #000;
        display: block;
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
      }

      /* Touch chrome: hidden on fine-pointer desktops unless the viewport is narrow. */
      #touch-ui {
        display: none;
        flex: 0 0 auto;
        align-items: stretch;
        gap: 12px;
        padding: 10px 16px calc(12px + var(--safe-b));
        background: linear-gradient(180deg, #050505 0%, #0d0d0d 100%);
        border-top: 2px solid #1a1a1a;
      }

      body.touch-ui #touch-ui {
        display: flex;
      }

      #touch-ui .side {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 10px;
        min-width: 72px;
      }

      #touch-ui .pad-btn {
        appearance: none;
        border: 2px solid var(--pad-edge);
        background: var(--pad-face);
        color: var(--pad-accent);
        border-radius: 10px;
        font: inherit;
        font-size: 10px;
        letter-spacing: 0.04em;
        padding: 12px 8px;
        min-height: 48px;
        cursor: pointer;
        touch-action: none;
      }

      #touch-ui .pad-btn:active,
      #touch-ui .pad-btn.is-pressed {
        background: #222;
        border-color: var(--pad-accent);
        color: #fff;
      }

      #btn-mute {
        color: var(--pad-cyan);
      }

      #btn-action {
        color: var(--pad-green);
        flex: 1;
      }

      #dpad {
        flex: 1 1 auto;
        display: grid;
        grid-template-columns: repeat(3, minmax(56px, 72px));
        grid-template-rows: repeat(3, minmax(52px, 64px));
        gap: 6px;
        justify-content: center;
        align-content: center;
        touch-action: none;
      }

      #dpad .pad-btn {
        min-height: 0;
        padding: 0;
        font-size: 18px;
        line-height: 1;
        border-radius: 12px;
      }

      #dpad [data-dir="up"] {
        grid-column: 2;
        grid-row: 1;
      }
      #dpad [data-dir="left"] {
        grid-column: 1;
        grid-row: 2;
      }
      #dpad [data-dir="right"] {
        grid-column: 3;
        grid-row: 2;
      }
      #dpad [data-dir="down"] {
        grid-column: 2;
        grid-row: 3;
      }

      #dpad .pad-spacer {
        grid-column: 2;
        grid-row: 2;
        border-radius: 8px;
        background: var(--pad);
        border: 2px solid #111;
        pointer-events: none;
      }

      /* Landscape phones: D-pad beside the stage so the playfield stays tall. */
      @media (orientation: landscape) and (max-height: 520px) {
        #app {
          flex-direction: row;
          padding-bottom: var(--safe-b);
        }

        #touch-ui {
          flex-direction: column;
          width: min(42vw, 280px);
          border-top: none;
          border-left: 2px solid #1a1a1a;
          padding: 10px calc(12px + var(--safe-r)) 10px 12px;
        }

        #touch-ui .side {
          flex-direction: row;
          min-width: 0;
        }

        #btn-action {
          flex: 1 1 auto;
        }

        #dpad {
          grid-template-columns: repeat(3, minmax(48px, 1fr));
          grid-template-rows: repeat(3, minmax(44px, 56px));
        }
      }

      @media (hover: none), (pointer: coarse), (max-width: 820px) {
        body.force-desktop-chrome #touch-ui {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <canvas id="game"></canvas>
      </div>
      <div id="touch-ui" aria-label="Touch controls">
        <div class="side">
          <button type="button" class="pad-btn" id="btn-mute" aria-label="Mute">MUTE</button>
          <button type="button" class="pad-btn" id="btn-action" aria-label="Start">START</button>
        </div>
        <div id="dpad" role="group" aria-label="Move frog">
          <button type="button" class="pad-btn" data-dir="up" aria-label="Up">▲</button>
          <button type="button" class="pad-btn" data-dir="left" aria-label="Left">◀</button>
          <div class="pad-spacer" aria-hidden="true"></div>
          <button type="button" class="pad-btn" data-dir="right" aria-label="Right">▶</button>
          <button type="button" class="pad-btn" data-dir="down" aria-label="Down">▼</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
